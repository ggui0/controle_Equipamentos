<!DOCTYPE html>
<html>
<head>
    <title>Editar Equipamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h3>Editar Equipamento</h3>

    <form method="POST">

        <div class="row g-3">

            <div class="col-md-4">
                <label>Tipo</label>
                <input class="form-control" name="tipo" value="{{ equipamento['tipo'] }}">
            </div>

            <div class="col-md-4">
                <label>Marca</label>
                <input class="form-control" name="marca" value="{{ equipamento['marca'] }}">
            </div>

            <div class="col-md-4">
                <label>Modelo</label>
                <input class="form-control" name="modelo" value="{{ equipamento['modelo'] }}">
            </div>

            <div class="col-md-4">
                <label>Número de Série</label>
                <input class="form-control" name="numero_serie" value="{{ equipamento['numero_serie'] }}">
            </div>

            <div class="col-md-4">
                <label>Service TAG</label>
                <input class="form-control" name="service_tag" value="{{ equipamento['service_tag'] }}">
            </div>

            <div class="col-md-4">
                <label>Tombamento</label>
                <input class="form-control" name="tombamento" value="{{ equipamento['tombamento'] }}">
            </div>

            <div class="col-md-6">
                <label>Especificações</label>
                <input class="form-control" name="especificacoes" value="{{ equipamento['especificacoes'] }}">
            </div>

            <div class="col-md-3">
                <label>Locado</label>
                <select class="form-control" name="locado">
                    <option {% if equipamento['locado']=='SIM' %}selected{% endif %}>SIM</option>
                    <option {% if equipamento['locado']=='NÃO' %}selected{% endif %}>NÃO</option>
                </select>
            </div>

            <div class="col-md-6">
                <label>Setor</label>
                <input class="form-control" name="setor" value="{{ equipamento['setor'] }}">
            </div>

            <div class="col-md-6">
                <label>Responsável</label>
                <input class="form-control" name="responsavel" value="{{ equipamento['responsavel'] }}">
            </div>

            <div class="col-md-12">
                <label>Observações</label>
                <input class="form-control" name="observacoes" value="{{ equipamento['observacoes'] }}">
            </div>

        </div>

        <br>

        <button class="btn btn-success">Salvar Alterações</button>
        <a href="/equipamentos" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
