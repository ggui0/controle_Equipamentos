<!DOCTYPE html>
<html>
<head>
    <title>Cadastrar Equipamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4>Cadastrar Novo Equipamento</h4>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Tipo</label>
                        <input name="tipo" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Marca</label>
                        <input name="marca" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Modelo</label>
                        <input name="modelo" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Número de Série</label>
                        <input name="numero_serie" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Service TAG</label>
                        <input name="service_tag" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Tombamento</label>
                        <input name="tombamento" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Especificações Técnicas</label>
                    <textarea name="especificacoes" class="form-control"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label>Locado</label>
                        <select name="locado" class="form-control">
                            <option>SIM</option>
                            <option>NÃO</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Setor</label>
                        <input name="setor" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Responsável</label>
                        <input name="responsavel" class="form-control">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Observações</label>
                    <textarea name="observacoes" class="form-control"></textarea>
                </div>

                <button class="btn btn-success">Salvar</button>
                <a href="/equipamentos" class="btn btn-secondary">Cancelar</a>

            </form>

        </div>
    </div>
</div>

</body>
</html>
