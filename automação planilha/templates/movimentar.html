<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Movimentar Equipamento</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Movimentar Equipamento</h4>
        </div>

        <div class="card-body">

            <h5 class="mb-3">
                {{ equipamento["tipo"] }} - {{ equipamento["modelo"] }}
            </h5>

            <p><strong>Setor Atual:</strong> {{ equipamento["setor"] }}</p>
            <p><strong>Responsável Atual:</strong> {{ equipamento["responsavel"] }}</p>

            <hr>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Tipo de Movimentação</label>
                    <select name="tipo_movimentacao" class="form-select">
                        <option value="TRANSFERENCIA">Transferência</option>
                        <option value="RETIRADA">Retirada</option>
                        <option value="DEVOLUCAO">Devolução</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Novo Setor</label>
                    <input type="text" name="para_setor" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Novo Responsável</label>
                    <input type="text" name="responsavel" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Usuário que está registrando</label>
                    <input type="text" name="usuario" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success">
                    Confirmar Movimentação
                </button>

                <a href="/equipamentos" class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
